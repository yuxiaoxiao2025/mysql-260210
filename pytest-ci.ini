[pytest]
minversion = 7.0
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths =
    tests/unit
    tests/integration
pythonpath = .
addopts =
    -v
    --strict-markers
    --cov=src.web.services.graph_service
    --cov=src.web.services.sql_generator
    --cov=src.web.state_manager
    --cov=src.web.utils.history_store
    --cov=src.memory
    --cov=src.agents
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
    --ignore=tests/unit/test_llm_client_streaming.py
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
    smoke: Smoke tests for critical paths
